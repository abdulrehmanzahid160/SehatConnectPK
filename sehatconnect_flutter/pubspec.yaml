name: sehatconnect
description: "SehatConnect - Pakistani healthcare wellness app for NUTECH."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  google_fonts: ^6.2.1
  shared_preferences: ^2.2.2
  uuid: ^4.3.3
  intl: ^0.19.0
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
